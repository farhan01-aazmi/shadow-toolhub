name: Autonomous Growth Engine 🚀

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight
  workflow_dispatch: # Allows manual trigger for testing

jobs:
  boost:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install Dependencies
        run: npm install
        
      - name: Run Autonomous Governor
        run: npx ts-node --compiler-options '{"module": "commonjs"}' scripts/autonomous-governor.ts
        env:
          NEXT_PUBLIC_SITE_URL: https://nevy.in
          # If we had API keys for Reddit/Pinterest, we would add them here as secrets
